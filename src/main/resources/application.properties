spring.application.name=embodied-ai-mcp-server

# --- MCP server (STDIO transport) ---
# Run as a headless process; the MCP client (e.g. Claude Desktop) launches it and
# talks JSON-RPC over stdin/stdout.
spring.main.web-application-type=none
spring.main.banner-mode=off
spring.ai.mcp.server.stdio=true
spring.ai.mcp.server.name=embodied-ai-mcp-server
spring.ai.mcp.server.version=0.0.1
spring.ai.mcp.server.type=SYNC

# stdout is reserved for the MCP protocol. Logging is configured in
# logback-spring.xml to write ONLY to logs/mcp-server.log (no console appender),
# so nothing can corrupt the JSON-RPC stream.
logging.level.root=INFO
